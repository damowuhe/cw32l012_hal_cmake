# =============================================================================
# CW32L012 target configuration for OpenOCD
#
# MCU: CW32L012 (Wuhan Xinyuan Semiconductor)
# Core: ARM Cortex-M0+
# Flash: 64KB @ 0x00000000
# RAM:   8KB  @ 0x20000000
# SWD:   PA13 (SWDIO), PA14 (SWCLK)
# =============================================================================

transport select swd

source [find target/swj-dp.tcl]
source [find mem_helper.tcl]

# ---------------------------------------------------------------------------
# Chip name
# ---------------------------------------------------------------------------
if { [info exists CHIPNAME] } {
   set _CHIPNAME $CHIPNAME
} else {
   set _CHIPNAME cw32l012
}

set _ENDIAN little

# ---------------------------------------------------------------------------
# Work area — RAM buffer used during flash programming
# CW32L012 has 8KB RAM, reserve up to 4KB for work area
# ---------------------------------------------------------------------------
if { [info exists WORKAREASIZE] } {
   set _WORKAREASIZE $WORKAREASIZE
} else {
   set _WORKAREASIZE 0x1000
}

# ---------------------------------------------------------------------------
# JTAG / SWD scan chain
# Cortex-M0+ IDCODE: 0x0BC11477
# ---------------------------------------------------------------------------
set _CPUTAPID 0x0bc11477

swj_newdap $_CHIPNAME cpu -irlen 4 -ircapture 0x1 -irmask 0xf -expected-id $_CPUTAPID
dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu

# ---------------------------------------------------------------------------
# Target configuration — Cortex-M0+
# ---------------------------------------------------------------------------
set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME cortex_m -endian $_ENDIAN -dap $_CHIPNAME.dap

$_TARGETNAME configure -work-area-phys 0x20000000 -work-area-size $_WORKAREASIZE -work-area-backup 0

# ---------------------------------------------------------------------------
# Flash bank configuration
# Flash controller base: 0x40022000
# Flash memory base:     0x00000000
# ---------------------------------------------------------------------------
set _FLASHNAME $_CHIPNAME.flash

# Use CW32 flash driver (if available in this OpenOCD build):
#   flash bank $_FLASHNAME cw32x 0x00000000 0 0 0 $_TARGETNAME
#
# Fallback: use generic AT32-style driver with flash controller address
flash bank $_FLASHNAME $_CHIPNAME 0x00000000 0 0 0 $_TARGETNAME 0x40022000 0x00100700

# ---------------------------------------------------------------------------
# Adapter speed
# After reset, HSI = 8MHz (HSI / 12 default). Use F_CPU / 6 ≈ 1.3MHz max.
# Using 1MHz for reliability.
# ---------------------------------------------------------------------------
adapter speed 1000
adapter srst delay 100

# ---------------------------------------------------------------------------
# Reset configuration
# ---------------------------------------------------------------------------
reset_config srst_nogate

if {![using_hla]} {
   cortex_m reset_config sysresetreq
}

# ---------------------------------------------------------------------------
# Reset-start: slow clock for initial connection
# ---------------------------------------------------------------------------
$_TARGETNAME configure -event reset-start {
    adapter speed 1000
}

# ---------------------------------------------------------------------------
# Examine-end: configure debug during low-power and stop watchdogs
# CW32L012 SYSCTRL_DEBUG register at 0x4000402C:
#   Bit 0  — ATIM_STOP
#   Bit 1  — GTIM1_STOP
#   Bit 2  — GTIM2_STOP
#   Bit 3  — GTIM3_STOP
#   Bit 4  — GTIM4_STOP
#   Bit 5  — BTIM123_STOP
#   Bit 6  — LPTIM_STOP
#   Bit 8  — RTC_STOP
#   Bit 9  — IWDT_STOP
#   Bit 10 — WWDT_STOP
#   Bit 11 — HALLTIM_STOP
# ---------------------------------------------------------------------------
$_TARGETNAME configure -event examine-end {
    # Stop all timers and watchdogs during debug halt
    # DBGMCU: stop ATIM, GTIM1-4, BTIM123, LPTIM, RTC, IWDT, WWDT, HALLTIM
    mmw 0x4000402C 0x00000F7F 0

    # Enable debug in sleep/deep-sleep modes via SYSCTRL_CR2 DSBRKEN bit (bit 13)
    mmw 0x40004008 0x00002000 0
}

# ---------------------------------------------------------------------------
# Reset-init: configure system clock after reset
# CW32L012 default: HSI / 12 = 8MHz
# Optionally boost to HSI / 4 = 24MHz by writing SYSCTRL_HSI
# ---------------------------------------------------------------------------
$_TARGETNAME configure -event reset-init {
    # 1. Set Flash wait cycle for >24MHz operation
    #    SYSCTRL_CR2 FLASHWAIT[6:4] = 001 (for 24-48MHz)
    mww 0x40004008 0x5A5A0010

    # 2. Set HSI divider to /4 = 24MHz
    #    SYSCTRL_HSI DIV[14:11] = 0100
    mmw 0x40004018 0x00008000 0

    # 3. Wait for HSI stable
    sleep 10

    # 4. Boost adapter speed after clock increase
    adapter speed 4000
}
